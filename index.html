<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOP Dart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff4da6,#4da6ff);
    color:white;
    overflow-x:hidden;
}

/* HEADER */
header{
    text-align:center;
    padding:40px 20px;
    background:rgba(0,0,0,0.75);
    animation:fadeIn 2s ease-in-out;
}

header h1{
    font-size:35px;
    background:linear-gradient(45deg,#ff99dd,#66ccff);
    -webkit-background-clip:text;
    color:transparent;
    animation:shake 3s infinite alternate;
}

header p{
    margin-top:10px;
    font-weight:bold;
    color:#fff;
}

/* Animations */
@keyframes shake{
    0%{transform:translateX(-3px);}
    100%{transform:translateX(3px);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* LAYOUT */
.container{
    display:flex;
    width:95%;
    margin:40px auto;
    gap:30px;
}

/* LEFT CONTENT */
.content{
    flex:2;
}

.section{
    background:rgba(0,0,0,0.75);
    padding:25px;
    margin-bottom:30px;
    border-radius:15px;
    box-shadow:0 0 20px #ff66cc;
    transition:0.3s;
}

.section:hover{
    transform:scale(1.02);
}

.section h2{
    margin-bottom:15px;
    color:#66ccff;
}

.code-box{
    background:#111;
    padding:15px;
    border-radius:10px;
    border:2px solid #66ccff;
    color:#00ffcc;
    font-family:monospace;
    overflow-x:auto;
}

/* COMMENT */
.comment-box{
    flex:1;
    background:rgba(0,0,0,0.85);
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px #66ccff;
    height:fit-content;
    position:sticky;
    top:20px;
}

.comment-box h2{
    text-align:center;
    margin-bottom:15px;
    color:#ff99dd;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:linear-gradient(45deg,#ff4da6,#4da6ff);
    color:white;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    opacity:0.8;
}

.comment-item{
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}

.comment-item strong{
    color:#66ccff;
}

.action-btn{
    margin-right:5px;
    font-size:12px;
}
</style>
</head>

<body>

<header>
<h1>OOP DART - OBJECT ORIENTED PROGRAMMING</h1>
<p>Alicia Putri Lestari | NIM: 251410011</p>
</header>

<div class="container">

<div class="content">

<div class="section">
<h2>01 - Pengertian OOP</h2>
<p>OOP adalah paradigma pemrograman berbasis object.</p>
</div>

<div class="section">
<h2>11 - Class Hewan</h2>
<div class="code-box">
<pre>
class Hewan {
  String nama;

  Hewan(this.nama);

  void bersuara(){
    print("$nama sedang bersuara!");
  }
}
</pre>
</div>
</div>

</div>

<div class="comment-box">
<h2>Forum Komentar</h2>

<input type="text" id="nama" placeholder="Nama...">
<textarea id="komentar" rows="3" placeholder="Tulis komentar..."></textarea>
<button onclick="tambahKomentar()">Kirim</button>

<div id="daftarKomentar"></div>
</div>

</div>

<script>
let komentarData = JSON.parse(localStorage.getItem("komentar")) || [];

function renderKomentar(){
    let container = document.getElementById("daftarKomentar");
    container.innerHTML = "";

    komentarData.forEach((item,index)=>{
        let div = document.createElement("div");
        div.className="comment-item";
        div.innerHTML = `
            <strong>${item.nama}</strong><br>
            <span>${item.isi}</span><br>
            <button class="action-btn" onclick="editKomentar(${index})">Edit</button>
            <button class="action-btn" onclick="hapusKomentar(${index})">Hapus</button>
        `;
        container.appendChild(div);
    });
}

function tambahKomentar(){
    let nama = document.getElementById("nama").value;
    let isi = document.getElementById("komentar").value;

    if(nama===""||isi===""){
        alert("Isi dulu semuanya!");
        return;
    }

    komentarData.push({nama:nama,isi:isi});
    localStorage.setItem("komentar",JSON.stringify(komentarData));

    document.getElementById("nama").value="";
    document.getElementById("komentar").value="";
    renderKomentar();
}

function hapusKomentar(index){
    komentarData.splice(index,1);
    localStorage.setItem("komentar",JSON.stringify(komentarData));
    renderKomentar();
}

function editKomentar(index){
    let baru = prompt("Edit komentar:",komentarData[index].isi);
    if(baru!==null){
        komentarData[index].isi=baru;
        localStorage.setItem("komentar",JSON.stringify(komentarData));
        renderKomentar();
    }
}

renderKomentar();
</script>

</body>
</html>
