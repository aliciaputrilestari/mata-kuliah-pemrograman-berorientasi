<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project DartPad Modern</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  background: linear-gradient(-45deg,#ff4ecd,#6a5cff,#00c3ff,#ff6ec7);
  background-size:400% 400%;
  animation:gradient 12s ease infinite;
  color:white;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  max-width:1100px;
  width:100%;
  text-align:center;
}

h1{
  font-size:2.5rem;
  margin-bottom:40px;
  background:linear-gradient(to right,#fff,#ffd6fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card{
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(15px);
  border-radius:25px;
  padding:30px 20px;
  transition:0.4s ease;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  width:150%;
  height:150%;
  background:radial-gradient(circle,#ff4ecd55,transparent);
  top:-50%;
  left:-50%;
  transform:rotate(25deg);
}

.card:hover{
  transform:translateY(-12px) scale(1.05);
  box-shadow:0 20px 40px rgba(255,0,200,0.4);
}

.card h3{
  margin-bottom:15px;
  color:#ff9afc;
  font-size:1.3rem;
}

.card p{
  font-size:0.9rem;
  opacity:0.85;
  margin-bottom:25px;
}

.btn{
  padding:12px 25px;
  border-radius:50px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(45deg,#ff4ecd,#6a5cff);
  color:white;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #ff4ecd;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  padding:20px;
}

.modal-content{
  width:95%;
  max-width:1000px;
  height:85%;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  animation:popup 0.4s ease;
}

@keyframes popup{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.modal iframe{
  width:100%;
  height:100%;
  border:none;
}

.close{
  position:absolute;
  top:10px;
  right:20px;
  font-size:25px;
  cursor:pointer;
  color:white;
  z-index:10;
}

@media(max-width:600px){
  h1{font-size:1.8rem;}
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 Project DartPad Saya</h1>

  <div class="grid">

    <div class="card">
      <h3>Program 1</h3>
      <p>Latihan dasar Dart dengan output sederhana.</p>
      <button class="btn" onclick="openModal('https://dartpad.dev/f7840a92c93fe8f3ca217d8aa5d35f24')">
        🚀 Run Code
      </button>
    </div>

    <div class="card">
      <h3>Program 2</h3>
      <p>Percabangan dan perulangan dalam Dart.</p>
      <button class="btn" onclick="openModal('https://dartpad.dev/aa646ee1837e770a7dd094803352a044')">
        🚀 Run Code
      </button>
    </div>

    <div class="card">
      <h3>Program 3</h3>
      <p>Latihan OOP dan function Dart.</p>
      <button class="btn" onclick="openModal('https://dartpad.dev/b52bd402da820a8ae6d046d1766c076b')">
        🚀 Run Code
      </button>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
function openModal(link){
  document.getElementById("modal").style.display="flex";
  document.getElementById("frame").src=link;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("frame").src="";
}
</script>

</body>
</html>
