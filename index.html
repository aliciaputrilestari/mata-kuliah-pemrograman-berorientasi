<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project DartPad</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(-45deg, #ff4ecd, #6a5cff, #00c3ff, #ff6ec7);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  min-height: 100vh;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  max-width: 1100px;
  width: 100%;
  text-align: center;
}

h1 {
  margin-bottom: 30px;
  font-size: 2.5rem;
  background: linear-gradient(to right, #fff, #ffb3f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px;
  transition: 0.4s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 15px 30px rgba(255, 0, 200, 0.4);
}

.card h3 {
  margin-bottom: 15px;
  color: #ff9afc;
}

.card p {
  font-size: 0.9rem;
  margin-bottom: 20px;
  opacity: 0.8;
}

.btn {
  padding: 10px 20px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(45deg, #ff4ecd, #6a5cff);
  color: white;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #ff4ecd;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal-content {
  width: 90%;
  height: 80%;
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
}

.modal iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.close {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 22px;
  cursor: pointer;
  color: white;
}

@media(max-width:600px){
  h1{
    font-size: 1.8rem;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Project DartPad Saya</h1>

  <div class="grid">

    <div class="card">
      <h3>Program 1</h3>
      <p>Latihan Dart dasar dengan output sederhana.</p>
      <button class="btn" onclick="openModal('https://dartpad.dev/f7840a92c93fe8f3ca217d8aa5d35f24')">
        Run Code
      </button>
    </div>

    <div class="card">
      <h3>Program 2</h3>
      <p>Program percabangan dan perulangan.</p>
      <button class="btn" onclick="openModal('https://dartpad.dev/aa646ee1837e770a7dd094803352a044')">
        Run Code
      </button>
    </div>

    <div class="card">
      <h3>Program 3</h3>
      <p>Latihan OOP dan fungsi dalam Dart.</p>
      <button class="btn" onclick="openModal('https://dartpad.dev/b52bd402da820a8ae6d046d1766c076b')">
        Run Code
      </button>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
function openModal(link){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("frame").src = link;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("frame").src = "";
}
</script>

</body>
</html>
