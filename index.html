<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Blue Popup</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #ff4ecd, #4ecbff);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Card utama */
.container {
  text-align: center;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  color: white;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  animation: fadeIn 1s ease;
}

.container h1 {
  font-size: 28px;
  margin-bottom: 15px;
}

.container p {
  font-size: 16px;
  margin-bottom: 25px;
}

.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4ecd;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #ff4ecd;
  color: white;
  transform: scale(1.05);
}

/* Popup overlay */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.5s ease;
}

/* Popup box */
.popup-content {
  background: linear-gradient(135deg, #ff4ecd, #4ecbff);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 90%;
  max-width: 400px;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  animation: slideUp 0.5s ease;
}

.popup-content h2 {
  margin-bottom: 15px;
}

.close-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: white;
  color: #ff4ecd;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.close-btn:hover {
  background: #ff4ecd;
  color: white;
}

/* Animations */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {transform: translateY(40px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}

/* Responsive */
@media (max-width: 480px) {
  .container {
    padding: 25px;
  }
  .container h1 {
    font-size: 22px;
  }
}
</style>

</head>
<body>

<div class="container">
  <h1>Website Pink 💖 Blue 💙</h1>
  <p>Desain modern, responsive, dan aesthetic!</p>
  <button class="btn" onclick="openPopup()">Buka Popup</button>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>Halo Cantik ✨</h2>
    <p>Ini popup dengan tema pink & biru yang super kece 😍</p>
    <button class="close-btn" onclick="closePopup()">Tutup</button>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
